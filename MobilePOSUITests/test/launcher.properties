#########################################################
#	System Properties for Launcher-less test Execution	#
######################################################### 

# Note: system properties (can be passed to Maven via -D[property.name])
# take precedence over these settings.

# Common settings often have getters/setters. All other settings can be
# accessed using AUTConfig.getInstance().get([property])


#driver.type=org.openqa.selenium.firefox.FirefoxDriver
#driver.type=org.openqa.selenium.firefox.HeadlessFirefoxDriver
