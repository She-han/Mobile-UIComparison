driver.type=org.openqa.selenium.chrome.ChromeDriver
# Web driver executable path
driver.exec.path=/path/to/webdriver
driver.instance.count=1

# HTML Fixed pos related settings
page.url=http://localhost:3000/
driver.remote.debugging.port=localhost:9222
driver.skip.navigation.onInit=true

autConfigPropertyFileName=posNextGen1024x768
testDataPropertyFileNames=testData
cucumber.plugin=pretty
autSimulateMouseMode=false
autClient.configFolder=/path/to/config/folder

autHostName=localhost
autPort=4099
TERMINAL_NUMBER=9
waitingTimeForHardRestartInMillis=30000
restapi.base.url=http://localhost:39830


# Enable debug to system.out/err during tests - default 'false'
debug.enabled=false