# =============================================================================
# Visual Regression - shared configuration
# -----------------------------------------------------------------------------
# These keys are read by BOTH sides of the pipeline:
#   * the in-project capture layer (com.enactor.pos.mobile.visual.*), and
#   * the standalone VisualRegressionEngine (comparison + HTML report).
# Keeping them in one file guarantees the two sides agree on output location
# and on which UI fields are tracked for field-level comparison.
#
# Resolution order (both sides): the process working directory first, then the
# class-path. This file lives on the test class-path; copy it next to where the
# engine runs if you invoke the engine from a different working directory.
# =============================================================================

# Master on/off switch for per-step screenshot capture during the test run.
VisualRegression.Enabled=true

# When true, each captured step is compared against its baseline inline (during the run) via the
# Dino server, and the report is refreshed as the run progresses. Set false to capture only — e.g.
# while establishing baselines, or to defer comparison to the post-run runner. Inline comparison is
# automatically skipped when no baseline directory exists yet.
VisualRegression.CompareEachStep=true

# When true (and CompareEachStep=true), a Cucumber scenario is FAILED if any of its steps is visually
# unmatched — the visual result then gates the functional test result. When false (default), visual
# mismatches are advisory only and never change a scenario's pass/fail. Only genuine mismatches count;
# a missing baseline or a comparison error does not fail the scenario. Requires the visual package on
# the Cucumber glue path (see testNG.xml).
VisualRegression.FailScenarioOnUnmatch=true

# Root folder for captured "actual" screenshots. Must match the directory the
# engine reads (its default is build/visual_outputs/actual).
VisualRegression.OutputDir=build/visual_outputs/actual

# ------------------------------------------------------------------------------
# Field-level tracking (optional)
# ------------------------------------------------------------------------------
# Comma-separated list of logical field names to track. For each name, provide a
# VisualRegression.CropField.<name> entry giving the Appium resource-id to locate.
# Leave CropFields empty to capture full-screen images only (no .meta boxes).
#
# Example (uncomment and adapt resource-ids to your app):
# VisualRegression.CropFields=TotalAmount,ItemList
# VisualRegression.CropField.TotalAmount=com.enactor.mobile.android.pos:id/totalValue
# VisualRegression.CropField.ItemList=com.enactor.mobile.android.pos:id/basketList
VisualRegression.CropFields=

# ------------------------------------------------------------------------------
# Comparison settings (consumed by com.enactor.pos.mobile.visual.VisualComparisonRunner
# when it POSTs each baseline/actual pair to the DINOv2 server). These are the same
# keys the standalone engine understood, so both sides share one source of truth.
# ------------------------------------------------------------------------------

# Approved baseline images. Same per-scenario/NNN_step.png layout as OutputDir above.
# Establish it by promoting a known-good actual run (see run-visual-compare.ps1 -Promote).
VisualRegression.BaselineDir=build/visual_outputs/baseline

# Where the HTML report and rendered diff images are written.
VisualRegression.ReportDir=build/reports/visual-regression

# DINOv2 comparison endpoint. Must be reachable and running the FastAPI /compare route.
VisualRegression.DinoServerUrl=http://localhost:9090/compare

# A state passes when global_similarity >= this value (0..1).
VisualRegression.SimilarityThreshold=0.7

# Default pass threshold for any tracked crop field (per-field override below).
VisualRegression.FieldSimilarityThreshold=0.80

# Optional per-field override, e.g.:
# VisualRegression.FieldThreshold.TotalAmount=0.90
